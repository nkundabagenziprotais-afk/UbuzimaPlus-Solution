---
deployment:
  tasks:
    - export REPOPATH=$PWD
    - export PUBLIC_DEPLOYPATH=$HOME/public_html
    - export ADMIN_DEPLOYPATH=$HOME/public_html/admin
    - /bin/mkdir -p $PUBLIC_DEPLOYPATH
    - /bin/mkdir -p $ADMIN_DEPLOYPATH
    - if [ -d "$REPOPATH/web/public-website/dist" ]; then /bin/cp -R "$REPOPATH/web/public-website/dist/"* "$PUBLIC_DEPLOYPATH"/; else echo "Public website dist not found. Build artifacts must exist before production deployment."; fi
    - if [ -d "$REPOPATH/web/admin-dashboard/dist" ]; then /bin/cp -R "$REPOPATH/web/admin-dashboard/dist/"* "$ADMIN_DEPLOYPATH"/; else echo "Admin dashboard dist not found. Build artifacts must exist before production deployment."; fi
