name: POS Session Diagnostic

on:
  push:
    branches:
      - feature/pos-inventory-procurement-enterprise-completion
  pull_request:
    branches:
      - development

jobs:
  pos-session-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=database/database.sqlite|' .env

      - name: Run POS session tests
        id: tests
        shell: bash
        run: |
          set +e
          php artisan test tests/Feature/PharmaCo360/PharmacoPosSessionApiTest.php --colors=never > pos-session-test.log 2>&1
          code=$?
          echo "$code" > pos-session-exit-code.txt
          cat pos-session-test.log
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: pos-session-diagnostic
          path: |
            backend/pos-session-test.log
            backend/pos-session-exit-code.txt
          if-no-files-found: error
